
services:
  db:
    image: postgres:15-alpine
    container_name: safiri_postgres
    restart: always
    environment:
      POSTGRES_USER: safiri_user
      POSTGRES_PASSWORD: safiri_password
      POSTGRES_DB: safiri_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: safiri_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@safiri.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db

  redis:
    image: redis:alpine
    container_name: safiri_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
